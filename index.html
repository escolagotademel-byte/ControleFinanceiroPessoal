<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Controle Financeiro</title>

  <link rel="stylesheet" href="css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <aside class="sidebar">

    <div class="brand">💰 Financeiro Pessoal</div>

    <button
      id="btnMenuInferior"
      class="nav nav-menu-mobile"
      type="button"
    >
      ☰ Menu
    </button>

    <button
      class="nav nav-opcao active"
      data-page="dashboard"
      type="button"
    >
      🏠 Dashboard
    </button>

    <button
      class="nav nav-opcao"
      data-page="entradas"
      type="button"
    >
      ➕ Entradas
    </button>

    <button
      class="nav nav-opcao"
      data-page="saidas"
      type="button"
    >
      ➖ Saídas
    </button>

    <button
      class="nav nav-opcao"
      data-page="recorrencias"
      type="button"
    >
      🔄 Recorrências
    </button>

    <button
      class="nav nav-opcao"
      data-page="previsao"
      type="button"
    >
      📅 Fluxo Previsto
    </button>

    <button
      class="nav nav-opcao"
      data-page="configuracoes"
      type="button"
    >
      ⚙️ Configurações
    </button>

  </aside>

  <main class="main">

    <div class="topbar">

      <div>
        <h1 id="pageTitle">Controle Financeiro</h1>
        <p id="pageSubtitle">Resumo financeiro pessoal</p>
      </div>

      <span id="statusConexao" class="status">
        Conectando...
      </span>

    </div>

    <section id="app"></section>

  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/entradas.js"></script>
  <script src="js/saidas.js"></script>
  <script src="js/recorrencias.js"></script>
  <script src="js/previsao.js"></script>
  <script src="js/configuracoes.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
