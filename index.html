<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Financeiro Pessoal</title>

  <link rel="stylesheet" href="css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="app-pessoal">

  <main class="main main-pessoal">

    <div class="topbar topbar-pessoal">

      <div>
        <h1 id="pageTitle">💰 Financeiro Pessoal</h1>

        <p id="pageSubtitle">
          Resumo do seu mês
        </p>
      </div>

      <button
        id="btnVoltarInicio"
        class="btn-voltar-inicio"
        type="button"
        onclick="navegar('dashboard')"
        hidden
      >
        ← Início
      </button>

      <span id="statusConexao" class="status">
        Conectando...
      </span>

    </div>

    <section id="app"></section>

  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/entradas.js"></script>
  <script src="js/saidas.js"></script>
  <script src="js/recorrencias.js"></script>
  <script src="js/previsao.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
